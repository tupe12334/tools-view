<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Graph</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #0f1117;
        color: #e2e8f0;
        font-family: system-ui, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      #bar {
        padding: 10px 16px;
        background: #1a1d27;
        border-bottom: 1px solid #2d3148;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-shrink: 0;
      }
      #bar h1 {
        font-size: 13px;
        font-weight: 600;
        color: #a5b4fc;
        letter-spacing: 0.05em;
      }
      #legend {
        display: flex;
        gap: 14px;
        margin-left: auto;
      }
      .leg {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        color: #94a3b8;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
      }
      #spacing-wrap {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 11px;
        color: #94a3b8;
        margin-left: 18px;
        border-left: 1px solid #2d3148;
        padding-left: 18px;
      }
      #spacing {
        accent-color: #a5b4fc;
        width: 90px;
        cursor: pointer;
      }
      canvas {
        flex: 1;
        display: block;
        cursor: grab;
      }
      canvas.grabbing {
        cursor: grabbing;
      }
      #tip {
        position: fixed;
        display: none;
        background: #1e2235;
        border: 1px solid #3b4168;
        border-radius: 7px;
        padding: 9px 13px;
        font-size: 12px;
        max-width: 280px;
        pointer-events: none;
        z-index: 9;
        line-height: 1.5;
      }
      #tip b {
        color: #a5b4fc;
        display: block;
        margin-bottom: 3px;
        font-size: 13px;
      }
      #tip .t {
        color: #64748b;
        margin-top: 5px;
        font-size: 11px;
      }
      #modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        z-index: 99;
      }
      #modal.open {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #modal-content {
        background: #1a1d27;
        border: 1px solid #3b4168;
        border-radius: 10px;
        padding: 24px;
        max-width: 90vw;
        max-height: 90vh;
        overflow: auto;
        color: #e2e8f0;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }
      #modal-title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 16px;
        color: #a5b4fc;
      }
      #modal-close {
        position: absolute;
        top: 12px;
        right: 12px;
        background: #3b4168;
        border: none;
        color: #e2e8f0;
        cursor: pointer;
        padding: 8px 12px;
        border-radius: 5px;
        font-size: 14px;
      }
      #modal-close:hover {
        background: #4f5d8a;
      }
      .mermaid {
        display: flex;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="bar">
      <h1 id="title">Graph</h1>
      <div id="type-legend" style="display:flex;gap:10px;margin-left:14px;border-right:1px solid #2d3148;padding-right:14px;">
        <div class="leg" id="leg-skill">
          <div style="width:12px;height:12px;border-radius:3px;background:#1e2235;border:1.5px solid #4f5d8a"></div>
          skill
        </div>
        <div class="leg" id="leg-agent">
          <div style="width:12px;height:12px;border-radius:3px;background:#1a2820;border:1.5px solid #4a7c55"></div>
          agent
        </div>
      </div>
      <div id="legend">
        <div class="leg">
          <div class="dot" style="background: #f87171"></div>
          prerequisite
        </div>
        <div class="leg">
          <div class="dot" style="background: #60a5fa"></div>
          calls
        </div>
        <div class="leg">
          <div class="dot" style="background: #34d399"></div>
          suggests
        </div>
        <div class="leg">
          <div class="dot" style="background: #94a3b8"></div>
          references
        </div>
      </div>
      <div id="spacing-wrap">
        <span>Spacing</span>
        <input id="spacing" type="range" min="1" max="10" value="5" step="1" />
      </div>
    </div>
    <canvas id="c"></canvas>
    <div id="tip"></div>
    <div id="modal">
      <div id="modal-content">
        <button id="modal-close">×</button>
        <div id="modal-title"></div>
        <div id="modal-body"></div>
      </div>
    </div>
    <script>
      const G = __GRAPH_DATA__;
      window.__toolsview = { G };

      function extractMermaidBlocks(body) {
        const blocks = [];
        const regex = /```mermaid\n([\s\S]*?)\n```/g;
        let match;
        while ((match = regex.exec(body)) !== null) {
          blocks.push(match[1]);
        }
        return blocks;
      }

      function highlightSkillNodes(mermaidCode) {
        const skillIds = new Set(nodes.map((n) => n.id));
        const nodeIdRegex = /([a-zA-Z0-9_-]+)\[(.*?)\]/g;
        const matchedIds = new Set();
        let match;
        while ((match = nodeIdRegex.exec(mermaidCode)) !== null) {
          const nodeId = match[1];
          if (skillIds.has(nodeId)) {
            matchedIds.add(nodeId);
          }
        }
        if (matchedIds.size === 0) return mermaidCode;
        const styleBlock =
          '\n  style ' +
          Array.from(matchedIds)
            .map((id) => id + ' fill:#2d5a3d,stroke:#86efac,color:#e2e8f0,stroke-width:2px')
            .join('; ');
        return mermaidCode + styleBlock;
      }

      function showMermaidModal(node) {
        if (!node.body) {
          alert('No diagram found for this ' + node.type);
          return;
        }
        const mermaidBlocks = extractMermaidBlocks(node.body);
        if (mermaidBlocks.length === 0) {
          alert('No mermaid diagrams found in ' + node.name);
          return;
        }
        const modal = document.getElementById('modal');
        const title = document.getElementById('modal-title');
        const body = document.getElementById('modal-body');
        title.textContent = node.name;
        body.innerHTML = mermaidBlocks
          .map((block, i) => {
            const highlighted = highlightSkillNodes(block);
            return `<div class="mermaid" id="mermaid-${i}">${highlighted}</div>`;
          })
          .join('<hr style="margin:20px 0;border:1px solid #3b4168;">');
        modal.classList.add('open');
        if (typeof mermaid !== 'undefined' && mermaid.contentLoaded) {
          mermaid.contentLoaded();
        } else if (typeof mermaid !== 'undefined' && mermaid.run) {
          setTimeout(() => mermaid.run(), 0);
        }
      }

      const hasSkills = G.nodes.some((n) => n.type === 'skill');
      const hasAgents = G.nodes.some((n) => n.type === 'agent');
      document.getElementById('title').textContent =
        hasSkills && hasAgents ? 'Skills & Agents Graph' : hasAgents ? 'Agents Graph' : 'Skills Graph';
      document.title = document.getElementById('title').textContent;
      if (!hasSkills) document.getElementById('leg-skill').style.display = 'none';
      if (!hasAgents) document.getElementById('leg-agent').style.display = 'none';
      if (!hasSkills || !hasAgents) document.getElementById('type-legend').style.borderRight = 'none';

      const NODE_FILL = { skill: '#1e2235', agent: '#1a2820' };
      const NODE_BORDER = { skill: '#4f5d8a', agent: '#4a7c55' };
      const NODE_FILL_DRAG = { skill: '#2d3458', agent: '#1f3d2a' };
      const NODE_BORDER_DRAG = { skill: '#a5b4fc', agent: '#86efac' };

      const COLORS = {
        prerequisite: '#f87171',
        calls: '#60a5fa',
        suggests: '#34d399',
        references: '#475569',
      };

      const canvas = document.getElementById('c');
      const ctx = canvas.getContext('2d');
      const tip = document.getElementById('tip');

      let W, H;
      let pan = { x: 0, y: 0 },
        scale = 1;
      let drag = null,
        panDrag = null;
      let spacingFactor = 1;
      let clickNode = null,
        clickPos = null;

      document.getElementById('spacing').addEventListener('input', (e) => {
        spacingFactor = e.target.value / 5;
        ticks = 0;
      });

      const nodes = G.nodes.map((n) => ({ ...n, x: 0, y: 0, vx: 0, vy: 0, w: 0, h: 0 }));
      const nodeById = Object.fromEntries(nodes.map((n) => [n.id, n]));
      const edges = G.edges;
      window.__toolsview.nodes = nodes;

      function resize() {
        W = canvas.width = canvas.offsetWidth;
        H = canvas.height = canvas.offsetHeight;
      }

      function initPositions() {
        nodes.forEach((n, i) => {
          const a = (2 * Math.PI * i) / nodes.length;
          const r = Math.min(W, H) * 0.32;
          n.x = W / 2 + r * Math.cos(a);
          n.y = H / 2 + r * Math.sin(a);
        });
      }

      function measureNodes() {
        ctx.font = 'bold 12px system-ui';
        nodes.forEach((n) => {
          n.w = ctx.measureText(n.name).width + 24;
          n.h = 30;
        });
      }

      function tick() {
        const k = 200 * spacingFactor,
          repulsion = 8000 * spacingFactor * spacingFactor,
          damping = 0.82,
          dt = 0.6;

        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const a = nodes[i],
              b = nodes[j];
            const dx = b.x - a.x,
              dy = b.y - a.y;
            const dist = Math.max(Math.sqrt(dx * dx + dy * dy), 1);
            const f = repulsion / (dist * dist);
            const fx = (f * dx) / dist,
              fy = (f * dy) / dist;
            a.vx -= fx;
            a.vy -= fy;
            b.vx += fx;
            b.vy += fy;
          }
        }

        edges.forEach((e) => {
          const a = nodeById[e.from],
            b = nodeById[e.to];
          if (!a || !b) return;
          const dx = b.x - a.x,
            dy = b.y - a.y;
          const dist = Math.max(Math.sqrt(dx * dx + dy * dy), 1);
          const f = (dist - k) * 0.04;
          const fx = (f * dx) / dist,
            fy = (f * dy) / dist;
          a.vx += fx;
          a.vy += fy;
          b.vx -= fx;
          b.vy -= fy;
        });

        nodes.forEach((n) => {
          n.vx += (W / 2 - n.x) * 0.002;
          n.vy += (H / 2 - n.y) * 0.002;
        });

        nodes.forEach((n) => {
          if (n === drag) return;
          n.vx *= damping;
          n.vy *= damping;
          n.x += n.vx * dt;
          n.y += n.vy * dt;
        });
      }

      function screenToWorld(x, y) {
        return { x: (x - pan.x) / scale, y: (y - pan.y) / scale };
      }

      function drawArrow(x1, y1, x2, y2, color, dashed) {
        ctx.save();
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = dashed ? 1 : 1.5;
        if (dashed) ctx.setLineDash([4, 4]);

        const dx = x2 - x1,
          dy = y2 - y1;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        const ux = dx / len,
          uy = dy / len;
        const ax = x1 + ux * 10,
          ay = y1 + uy * 10;
        const bx = x2 - ux * 14,
          by = y2 - uy * 14;

        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(bx, by);
        ctx.stroke();
        ctx.setLineDash([]);

        const hw = 6,
          hl = 10;
        const px = -uy,
          py = ux;
        ctx.beginPath();
        ctx.moveTo(bx + ux * hl, by + uy * hl);
        ctx.lineTo(bx + px * hw, by + py * hw);
        ctx.lineTo(bx - px * hw, by - py * hw);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        ctx.save();
        ctx.translate(pan.x, pan.y);
        ctx.scale(scale, scale);

        edges.forEach((e) => {
          const a = nodeById[e.from],
            b = nodeById[e.to];
          if (!a || !b) return;
          const color = COLORS[e.type] || COLORS.references;
          drawArrow(a.x, a.y, b.x, b.y, color, e.type === 'references');
          const mx = (a.x + b.x) / 2,
            my = (a.y + b.y) / 2;
          ctx.font = '10px system-ui';
          ctx.fillStyle = color;
          ctx.globalAlpha = 0.75;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(e.type, mx, my - 7);
          ctx.globalAlpha = 1;
        });

        nodes.forEach((n) => {
          const hw = n.w / 2,
            hh = n.h / 2;
          ctx.beginPath();
          ctx.roundRect(n.x - hw, n.y - hh, n.w, n.h, 6);
          ctx.fillStyle = n === drag ? NODE_FILL_DRAG[n.type] : NODE_FILL[n.type];
          ctx.fill();
          ctx.strokeStyle = n === drag ? NODE_BORDER_DRAG[n.type] : NODE_BORDER[n.type];
          ctx.lineWidth = n === drag ? 2 : 1.5;
          ctx.stroke();
          ctx.font = 'bold 12px system-ui';
          ctx.fillStyle = '#e2e8f0';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(n.name, n.x, n.y);
        });

        ctx.restore();
      }

      let ticks = 0;
      function loop() {
        if (ticks < 300) {
          tick();
          ticks++;
        }
        draw();
        requestAnimationFrame(loop);
      }

      function hitNode(wx, wy) {
        return nodes.find((n) => Math.abs(wx - n.x) < n.w / 2 && Math.abs(wy - n.y) < n.h / 2);
      }

      canvas.addEventListener('mousedown', (e) => {
        const { x, y } = screenToWorld(e.offsetX, e.offsetY);
        const n = hitNode(x, y);
        if (n) {
          drag = n;
          clickNode = n;
          clickPos = { x: e.clientX, y: e.clientY };
          canvas.classList.add('grabbing');
        } else {
          panDrag = { sx: e.offsetX - pan.x, sy: e.offsetY - pan.y };
          canvas.classList.add('grabbing');
        }
      });

      canvas.addEventListener('mousemove', (e) => {
        if (drag) {
          const { x, y } = screenToWorld(e.offsetX, e.offsetY);
          drag.x = x;
          drag.y = y;
          drag.vx = 0;
          drag.vy = 0;
          ticks = 0;
          tip.style.display = 'none';
          return;
        }
        if (panDrag) {
          pan.x = e.offsetX - panDrag.sx;
          pan.y = e.offsetY - panDrag.sy;
          return;
        }
        const { x, y } = screenToWorld(e.offsetX, e.offsetY);
        const n = hitNode(x, y);
        if (n) {
          const desc =
            n.description.length > 160 ? n.description.slice(0, 157) + '…' : n.description;
          const tools = n.allowedTools.length
            ? '<div class="t">Tools: ' + n.allowedTools.join(', ') + '</div>'
            : '';
          const typeLabel = '<div class="t">' + n.type + '</div>';
          tip.innerHTML = '<b>' + n.name + '</b>' + typeLabel + '<div>' + desc + '</div>' + tools;
          tip.style.display = 'block';
          const pad = 12,
            tw = tip.offsetWidth || 280;
          tip.style.left =
            (e.clientX + pad + tw > window.innerWidth ? e.clientX - tw - pad : e.clientX + pad) +
            'px';
          tip.style.top = e.clientY + pad + 'px';
        } else {
          tip.style.display = 'none';
        }
      });

      window.addEventListener('mouseup', (e) => {
        if (clickNode && clickPos) {
          const dx = e.clientX - clickPos.x;
          const dy = e.clientY - clickPos.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 5) {
            showMermaidModal(clickNode);
          }
        }
        drag = null;
        panDrag = null;
        clickNode = null;
        clickPos = null;
        canvas.classList.remove('grabbing');
      });

      canvas.addEventListener(
        'wheel',
        (e) => {
          e.preventDefault();
          const factor = e.deltaY < 0 ? 1.1 : 0.9;
          pan.x = e.offsetX - (e.offsetX - pan.x) * factor;
          pan.y = e.offsetY - (e.offsetY - pan.y) * factor;
          scale *= factor;
        },
        { passive: false },
      );

      const modal = document.getElementById('modal');
      const closeBtn = document.getElementById('modal-close');
      closeBtn.addEventListener('click', () => {
        modal.classList.remove('open');
      });
      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.classList.remove('open');
        }
      });

      window.addEventListener('resize', resize);
      resize();
      measureNodes();
      initPositions();
      loop();

      // Initialize mermaid when loaded
      if (typeof mermaid !== 'undefined') {
        mermaid.initialize({ startOnLoad: true });
      } else {
        console.warn('Mermaid.js not loaded - diagrams may not render');
      }
    </script>
  </body>
</html>
