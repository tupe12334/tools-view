<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Graph</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #0f1117;
        color: #e2e8f0;
        font-family: system-ui, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      #bar {
        padding: 10px 16px;
        background: #1a1d27;
        border-bottom: 1px solid #2d3148;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-shrink: 0;
      }
      #bar h1 {
        font-size: 13px;
        font-weight: 600;
        color: #a5b4fc;
        letter-spacing: 0.05em;
      }
      #legend {
        display: flex;
        gap: 14px;
        margin-left: auto;
      }
      .leg {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        color: #94a3b8;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
      }
      #spacing-wrap {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 11px;
        color: #94a3b8;
        margin-left: 18px;
        border-left: 1px solid #2d3148;
        padding-left: 18px;
      }
      #spacing {
        accent-color: #a5b4fc;
        width: 90px;
        cursor: pointer;
      }
      canvas {
        flex: 1;
        display: block;
        cursor: grab;
      }
      canvas.grabbing {
        cursor: grabbing;
      }
      #tip {
        position: fixed;
        display: none;
        background: #1e2235;
        border: 1px solid #3b4168;
        border-radius: 7px;
        padding: 9px 13px;
        font-size: 12px;
        max-width: 280px;
        pointer-events: none;
        z-index: 9;
        line-height: 1.5;
      }
      #tip b {
        color: #a5b4fc;
        display: block;
        margin-bottom: 3px;
        font-size: 13px;
      }
      #tip .t {
        color: #64748b;
        margin-top: 5px;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div id="bar">
      <h1 id="title">Graph</h1>
      <div id="type-legend" style="display:flex;gap:10px;margin-left:14px;border-right:1px solid #2d3148;padding-right:14px;">
        <div class="leg" id="leg-skill">
          <div style="width:12px;height:12px;border-radius:3px;background:#1e2235;border:1.5px solid #4f5d8a"></div>
          skill
        </div>
        <div class="leg" id="leg-agent">
          <div style="width:12px;height:12px;border-radius:3px;background:#1a2820;border:1.5px solid #4a7c55"></div>
          agent
        </div>
      </div>
      <div id="legend">
        <div class="leg">
          <div class="dot" style="background: #f87171"></div>
          prerequisite
        </div>
        <div class="leg">
          <div class="dot" style="background: #60a5fa"></div>
          calls
        </div>
        <div class="leg">
          <div class="dot" style="background: #34d399"></div>
          suggests
        </div>
        <div class="leg">
          <div class="dot" style="background: #94a3b8"></div>
          references
        </div>
      </div>
      <div id="spacing-wrap">
        <span>Spacing</span>
        <input id="spacing" type="range" min="1" max="10" value="5" step="1" />
      </div>
    </div>
    <canvas id="c"></canvas>
    <div id="tip"></div>
    <script>window.__GRAPH_DATA__ = /*__GRAPH_DATA_PLACEHOLDER__*/null;</script>
    <script>/*__VIEWER_BUNDLE__*/</script>
  </body>
</html>
